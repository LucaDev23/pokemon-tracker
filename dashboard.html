<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Tracker – Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .dual-panel {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      margin-bottom: 32px;
    }
    .panel-feuerrot {
      background: var(--fr-bg); border: 3px solid var(--fr-primary);
      border-radius: var(--radius); padding: 24px;
    }
    .panel-blattgruen {
      background: var(--bg-bg); border: 3px solid var(--bg-primary);
      border-radius: var(--radius); padding: 24px;
    }
    .panel-feuerrot  .panel-title { font-family:var(--font-pixel); font-size:9px; color:var(--fr-dark); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .panel-blattgruen .panel-title { font-family:var(--font-pixel); font-size:9px; color:var(--bg-dark); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

    .trainer-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .trainer-avatar { width:64px; height:64px; border-radius:50%; border:3px solid white; box-shadow:var(--shadow); image-rendering:pixelated; }
    .trainer-name  { font-weight:800; font-size:17px; }
    .trainer-sub   { font-size:12px; color:var(--text-mid); margin-top:2px; }

    .panel-feuerrot  .panel-badge { padding:3px 10px; border-radius:20px; background:var(--fr-primary);  color:white; font-size:10px; font-weight:800; }
    .panel-blattgruen .panel-badge { padding:3px 10px; border-radius:20px; background:var(--bg-primary); color:white; font-size:10px; font-weight:800; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .panel-feuerrot  .stat-box { background:var(--fr-card); }
    .panel-feuerrot  .stat-number { color:var(--fr-dark); }
    .panel-blattgruen .stat-box { background:var(--bg-card); }
    .panel-blattgruen .stat-number { color:var(--bg-dark); }

    .badges-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
    .badge-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; }
    .badge-icon.earned  { background:gold; box-shadow:0 0 6px gold; }
    .badge-icon.missing { background:#eee; opacity:0.35; }

    /* Tauschbörse Mini */
    .trade-mini { display:flex; gap:8px; margin-top:10px; }
    .trade-mini-box {
      flex:1; padding:8px 10px; border-radius:var(--radius-sm);
      font-size:11px; font-weight:800; text-align:center;
    }
    .panel-feuerrot  .trade-mini-box { background:var(--fr-card);  color:var(--fr-dark); border:1.5px solid var(--fr-secondary); }
    .panel-blattgruen .trade-mini-box { background:var(--bg-card); color:var(--bg-dark); border:1.5px solid var(--bg-secondary); }
    .trade-mini-num { font-family:var(--font-pixel); font-size:14px; display:block; margin-bottom:2px; }

    /* Duel Score */
    .duel-score { display:flex; align-items:center; justify-content:center; gap:24px; padding:20px; }
    .duel-number { font-family:var(--font-pixel); font-size:40px; }
    .duel-vs     { font-family:var(--font-pixel); font-size:12px; color:var(--text-mid); }
    .fr-num { color:var(--fr-primary); }
    .bg-num { color:var(--bg-primary); }
    .duel-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); margin-bottom:7px; font-size:13px; }
    .duel-row.fr-win  { background:var(--fr-bg); border-left:4px solid var(--fr-primary); }
    .duel-row.bg-win  { background:var(--bg-bg); border-left:4px solid var(--bg-primary); }
    .duel-row.draw    { background:#f5f5f5;       border-left:4px solid #bbb; }
    .duel-date { font-size:11px; color:var(--text-mid); margin-left:auto; }

    .quick-actions { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
    .quick-btn { background:white; border:2px solid var(--light-green); border-radius:var(--radius); padding:18px 10px; text-align:center; text-decoration:none; color:var(--text-dark); transition:all 0.2s; display:block; }
    .quick-btn:hover { border-color:var(--mid-green); background:var(--light-green); transform:translateY(-2px); }
    .quick-btn .qb-icon  { font-size:30px; display:block; margin-bottom:5px; }
    .quick-btn .qb-label { font-weight:800; font-size:12px; }

    @media(max-width:768px){ .dual-panel,.quick-actions{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div id="loading-screen"><div class="pokeball-loader"></div></div>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<div class="page-wrapper">
  <div class="page-title"><span class="icon">📊</span> DASHBOARD</div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <a class="quick-btn" href="progress.html"><span class="qb-icon">🗺️</span><span class="qb-label">Fortschritt</span></a>
    <a class="quick-btn" href="pokedex.html"><span class="qb-icon">📖</span><span class="qb-label">Pokédex</span></a>
    <a class="quick-btn" href="duels.html"><span class="qb-icon">⚔️</span><span class="qb-label">Duelle</span></a>
    <a class="quick-btn" href="trade.html"><span class="qb-icon">🔄</span><span class="qb-label">Tauschbörse</span></a>
  </div>

  <!-- Trainer-Panels -->
  <div class="dual-panel" id="dual-panel">
    <div style="color:var(--text-mid)">Lade...</div>
  </div>

  <!-- Duelle -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title">⚔️ DUELL-BILANZ</div>
    <div class="duel-score">
      <div style="text-align:center">
        <div class="duel-number fr-num" id="fr-wins">–</div>
        <div style="font-size:11px;color:var(--fr-dark);font-weight:800">🔴 FEUERROT</div>
      </div>
      <div class="duel-vs">VS</div>
      <div style="text-align:center">
        <div class="duel-number bg-num" id="bg-wins">–</div>
        <div style="font-size:11px;color:var(--bg-dark);font-weight:800">🟢 BLATTGRÜN</div>
      </div>
    </div>
    <div id="recent-duels"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
  const BADGE_NAMES = ['Felsorden','Kaskaden','Donnerorden','Regenbogen','Sumpforden','Marschen','Vulkan','Erdorden'];

  requireAuth(async () => { loadDashboard(); });

  async function loadDashboard() {
    const snap = await db.collection('players').get();
    const players = {};
    snap.forEach(doc => { players[doc.data().edition] = doc.data(); });

    const tradeSnap = await db.collection('trades').get();
    const tradeCounts = {};
    tradeSnap.forEach(doc => {
      const d = doc.data();
      if (!tradeCounts[d.uid]) tradeCounts[d.uid] = {offer:0, wanted:0};
      if (d.type === 'offer') tradeCounts[d.uid].offer++;
      else                    tradeCounts[d.uid].wanted++;
    });

    const tradeByEdition = {};
    snap.forEach(doc => {
      const d = doc.data();
      tradeByEdition[d.edition] = tradeCounts[d.uid] || {offer:0, wanted:0};
    });

    renderDualPanel(players, tradeByEdition);
    await loadDuelStats();
  }

  function renderDualPanel(players, tradeByEdition) {
    const panel = document.getElementById('dual-panel');
    panel.innerHTML = '';
    ['feuerrot','blattgruen'].forEach(ed => {
      const p  = players[ed];
      const tc = tradeByEdition[ed] || {offer:0, wanted:0};
      if (!p) {
        panel.innerHTML += `<div class="panel-${ed}"><p style="color:var(--text-mid);font-size:13px">Noch nicht eingerichtet.</p></div>`;
        return;
      }
      const badges = p.badges || 0;
      const badgesHtml = BADGE_NAMES.map((b,i) =>
        `<div class="badge-icon ${i<badges?'earned':'missing'}" title="${b}">🏅</div>`).join('');
      const caught = (p.pokedexCaught||[]).length;
      const seen   = (p.pokedexSeen||[]).length;
      panel.innerHTML += `
        <div class="panel-${ed}">
          <div class="panel-title">
            ${ed==='feuerrot'?'🔴 FEUERROT':'🟢 BLATTGRÜN'}
            <span class="panel-badge">${p.characterName}</span>
          </div>
          <div class="trainer-header">
            <img class="trainer-avatar"
              src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.starterId||1}.png" alt="Starter">
            <div>
              <div class="trainer-name">${p.characterName}</div>
              <div class="trainer-sub">Starter: ${p.starterName}</div>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat-box"><span class="stat-number">${badges}/8</span><div class="stat-label">Orden</div></div>
            <div class="stat-box"><span class="stat-number">${caught}</span><div class="stat-label">Gefangen</div></div>
            <div class="stat-box"><span class="stat-number">${seen}</span><div class="stat-label">Gesehen</div></div>
          </div>
          <div style="font-size:11px;font-weight:800;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Orden</div>
          <div class="badges-row">${badgesHtml}</div>
          <div class="trade-mini">
            <div class="trade-mini-box">
              <span class="trade-mini-num">${tc.offer}</span>
              ✅ Angebote
            </div>
            <div class="trade-mini-box">
              <span class="trade-mini-num">${tc.wanted}</span>
              🔍 Gesuche
            </div>
          </div>
        </div>`;
    });
  }

  async function loadDuelStats() {
    const snap = await db.collection('duels').orderBy('date','desc').limit(5).get();
    let frWins = 0, bgWins = 0;
    const duels = [];
    snap.forEach(doc => {
      const d = doc.data(); duels.push(d);
      if (d.winner === 'feuerrot') frWins++;
      else if (d.winner === 'blattgruen') bgWins++;
    });
    document.getElementById('fr-wins').textContent = frWins;
    document.getElementById('bg-wins').textContent = bgWins;

    const container = document.getElementById('recent-duels');
    if (duels.length === 0) {
      container.innerHTML = '<p style="color:var(--text-mid);font-size:13px">Noch keine Duelle eingetragen.</p>';
      return;
    }
    container.innerHTML = '<div style="font-size:11px;font-weight:800;color:var(--text-mid);text-transform:uppercase;margin-bottom:8px">Letzte Duelle</div>';
    duels.forEach(d => {
      const cls = d.winner==='feuerrot'?'fr-win':d.winner==='blattgruen'?'bg-win':'draw';
      const txt = d.winner==='feuerrot'?'🔴 Feuerrot gewinnt!':d.winner==='blattgruen'?'🟢 Blattgrün gewinnt!':'🤝 Unentschieden';
      container.innerHTML += `<div class="duel-row ${cls}"><span>⚔️</span><span style="font-weight:700">${txt}</span><span class="duel-date">${formatDate(d.date)}</span></div>`;
    });
  }
</script>
</body>
</html>
