<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Tracker – Pokédex</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pokedex-controls { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    .pokedex-controls input { flex:1; min-width:180px; }
    .filter-btn { padding:7px 14px; border-radius:20px; border:2px solid var(--light-green); background:white; font-weight:700; font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .filter-btn.active { background:var(--dark-green); color:white; border-color:var(--dark-green); }

    .pokedex-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }

    .pokemon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; }

    .poke-card {
      background:white; border:2px solid var(--light-green); border-radius:var(--radius-sm);
      padding:8px; text-align:center; cursor:pointer; transition:all 0.15s; position:relative;
      user-select:none;
    }
    .poke-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
    .poke-card.seen   { border-color:#FFB900; background:#FFFCE0; }
    .poke-card.caught { border-color:var(--mid-green); background:var(--light-green); }

    .poke-card img { width:60px; height:60px; image-rendering:pixelated; filter:grayscale(1); transition:filter 0.2s; }
    .poke-card.seen img, .poke-card.caught img { filter:grayscale(0); }

    .poke-number { font-size:8px; color:var(--text-mid); font-family:var(--font-pixel); }
    .poke-name   { font-size:10px; font-weight:800; margin-top:2px; line-height:1.3; }
    .poke-status { display:flex; justify-content:center; gap:3px; margin-top:3px; }
    .status-dot  { width:9px; height:9px; border-radius:50%; border:1.5px solid #ccc; background:white; }
    .status-dot.seen   { background:#FFB900; border-color:#cc9000; }
    .status-dot.caught { background:var(--mid-green); border-color:var(--dark-green); }

    /* Post-Game Karten */
    .poke-card.postgame {
      border-color:#9B59B6; background:#F9F0FF;
      cursor:not-allowed;
    }
    .poke-card.postgame img { filter:grayscale(1) brightness(0.7); }
    .postgame-lock {
      position:absolute; top:3px; right:4px; font-size:13px;
    }
    .postgame-note { font-size:9px; color:#9B59B6; margin-top:2px; line-height:1.3; display:none; }
    .poke-card.postgame:hover .postgame-note { display:block; }
    .poke-card.postgame.unlocked { cursor:pointer; border-color:var(--mid-green); background:white; }
    .poke-card.postgame.unlocked img { filter:grayscale(1); }
    .poke-card.postgame.unlocked .postgame-lock { display:none; }
    .poke-card.postgame.seen  { background:#FFFCE0; }
    .poke-card.postgame.caught { background:var(--light-green); }
    .poke-card.postgame.seen img,
    .poke-card.postgame.caught img { filter:grayscale(0); }

    .section-divider {
      margin:28px 0 16px;
      display:flex; align-items:center; gap:14px;
    }
    .section-divider h3 {
      font-family:var(--font-pixel); font-size:9px; white-space:nowrap;
    }
    .section-divider.main h3 { color:var(--dark-green); }
    .section-divider.postgame h3 { color:#9B59B6; }
    .divider-line { flex:1; height:2px; background:var(--light-green); }
    .section-divider.postgame .divider-line { background:#E8D5FF; }

    .postgame-locked-notice {
      background:#F9F0FF; border:2px solid #9B59B6; border-radius:var(--radius);
      padding:16px 20px; margin-bottom:16px; font-size:13px; font-weight:700; color:#6A2E8B;
      display:flex; align-items:center; gap:10px;
    }

    .context-tip {
      background:var(--light-green); border-radius:var(--radius-sm); padding:10px 14px;
      font-size:12px; font-weight:700; color:var(--dark-green); margin-bottom:14px;
    }
    .legend { display:flex; gap:16px; font-size:12px; font-weight:700; margin-bottom:14px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot { width:13px; height:13px; border-radius:50%; }
  </style>
</head>
<body>

<div id="loading-screen"><div class="pokeball-loader"></div></div>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<div class="page-wrapper">
  <div class="page-title"><span class="icon">📖</span> POKÉDEX</div>

  <div class="pokedex-stats" id="pokedex-stats"></div>

  <div class="context-tip">💡 Einmal = Gesehen 👁️ · Zweimal = Gefangen ✅ · Dreimal = Zurücksetzen</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:white;border:2px solid #ddd"></div> Unbekannt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFB900"></div> Gesehen 👁️</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mid-green)"></div> Gefangen ✅</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9B59B6"></div> Post-Game 🔒</div>
  </div>

  <div class="pokedex-controls">
    <input type="text" class="form-control" id="search-input" placeholder="🔍 Pokémon suchen..." oninput="renderGrid()">
    <button class="filter-btn active" id="filter-all"     onclick="setFilter('all')">Alle</button>
    <button class="filter-btn"        id="filter-seen"    onclick="setFilter('seen')">Gesehen</button>
    <button class="filter-btn"        id="filter-caught"  onclick="setFilter('caught')">Gefangen</button>
    <button class="filter-btn"        id="filter-missing" onclick="setFilter('missing')">Fehlend</button>
  </div>

  <!-- Gen 1 -->
  <div class="section-divider main">
    <h3>🎮 KANTO – 151 POKÉMON</h3>
    <div class="divider-line"></div>
  </div>
  <div class="pokemon-grid" id="pokemon-grid-main"></div>

  <!-- Post-Game -->
  <div class="section-divider postgame">
    <h3>🏆 NACH DEM SPIEL – SEVII-INSELN</h3>
    <div class="divider-line"></div>
  </div>
  <div id="postgame-notice"></div>
  <div class="pokemon-grid" id="pokemon-grid-postgame"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
  let seenSet   = new Set();
  let caughtSet = new Set();
  let currentFilter = 'all';
  let myBadges = 0;
  const ALL_8_BADGES = 8;

  requireAuth(async (user, data) => {
    seenSet   = new Set(data?.pokedexSeen   || []);
    caughtSet = new Set(data?.pokedexCaught || []);
    myBadges  = data?.badges || 0;
    renderStats();
    renderGrid();
  });

  function renderStats() {
    const allPokemon = POKEMON_LIST.length + (myBadges >= ALL_8_BADGES ? POSTGAME_POKEMON.length : 0);
    document.getElementById('pokedex-stats').innerHTML = `
      <div class="stat-box">
        <span class="stat-number">${caughtSet.size}</span>
        <div class="stat-label">✅ Gefangen</div>
      </div>
      <div class="stat-box">
        <span class="stat-number">${seenSet.size}</span>
        <div class="stat-label">👁️ Gesehen</div>
      </div>
      <div class="stat-box">
        <span class="stat-number">${myBadges}/8</span>
        <div class="stat-label">🏅 Orden</div>
      </div>`;
  }

  function renderGrid() {
    const query = document.getElementById('search-input').value.toLowerCase();
    renderMainGrid(query);
    renderPostGameGrid(query);
  }

  function renderMainGrid(query) {
    const grid = document.getElementById('pokemon-grid-main');
    const filtered = POKEMON_LIST.filter(p => matchesFilter(p, query));
    grid.innerHTML = '';
    if (filtered.length === 0) { grid.innerHTML = '<p style="color:var(--text-mid)">Keine gefunden.</p>'; return; }
    filtered.forEach(p => {
      grid.appendChild(makePokeCard(p, false));
    });
  }

  function renderPostGameGrid(query) {
    const notice   = document.getElementById('postgame-notice');
    const grid     = document.getElementById('pokemon-grid-postgame');
    const unlocked = myBadges >= ALL_8_BADGES;

    if (!unlocked) {
      notice.innerHTML = `<div class="postgame-locked-notice">
        🔒 Diese Pokémon werden sichtbar, wenn du alle 8 Orden gesammelt hast. (${myBadges}/8)
      </div>`;
      grid.innerHTML = '';
      // Zeige gesperrte Karten als Vorschau
      POSTGAME_POKEMON.forEach(p => {
        grid.appendChild(makePokeCard(p, true, false));
      });
      return;
    }

    notice.innerHTML = `<div style="background:var(--light-green);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;font-weight:700;color:var(--dark-green);margin-bottom:12px">
      🏆 Alle 8 Orden erhalten! Die Post-Game Pokémon der Sevii-Inseln sind freigeschaltet.
    </div>`;

    const filtered = POSTGAME_POKEMON.filter(p => matchesFilter(p, query));
    grid.innerHTML = '';
    if (filtered.length === 0) { grid.innerHTML = '<p style="color:var(--text-mid)">Keine gefunden.</p>'; return; }
    filtered.forEach(p => {
      grid.appendChild(makePokeCard(p, true, true));
    });
  }

  function matchesFilter(p, query) {
    const matchSearch = p.name.toLowerCase().includes(query) || String(p.id).includes(query);
    if (!matchSearch) return false;
    if (currentFilter === 'caught')  return caughtSet.has(p.id);
    if (currentFilter === 'seen')    return seenSet.has(p.id) && !caughtSet.has(p.id);
    if (currentFilter === 'missing') return !seenSet.has(p.id) && !caughtSet.has(p.id);
    return true;
  }

  function makePokeCard(p, isPostgame, unlocked = true) {
    const isCaught = caughtSet.has(p.id);
    const isSeen   = seenSet.has(p.id);
    const statusClass = isCaught ? 'caught' : isSeen ? 'seen' : '';

    const card = document.createElement('div');
    let classes = 'poke-card';
    if (isPostgame) {
      classes += ' postgame';
      if (unlocked) classes += ' unlocked';
    }
    if (statusClass) classes += ' ' + statusClass;
    card.className = classes;

    const imgSrc = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;

    card.innerHTML = `
      ${isPostgame && !unlocked ? '<span class="postgame-lock">🔒</span>' : ''}
      <div class="poke-number">#${String(p.id).padStart(3,'0')}</div>
      <img src="${imgSrc}" alt="${p.name}" loading="lazy">
      ${isPostgame && !unlocked ? '<div style="font-size:18px;color:#9B59B6;margin:-8px 0 4px">❓</div>' : ''}
      <div class="poke-name">${isPostgame && !unlocked ? '???' : p.name}</div>
      ${isPostgame && p.note ? `<div class="postgame-note">${p.note}</div>` : ''}
      ${!(isPostgame && !unlocked) ? `<div class="poke-status">
        <div class="status-dot ${isSeen||isCaught?'seen':''}"></div>
        <div class="status-dot ${isCaught?'caught':''}"></div>
      </div>` : ''}
    `;

    if (!isPostgame || (isPostgame && unlocked)) {
      card.onclick = () => toggleStatus(p.id);
    }
    return card;
  }

  async function toggleStatus(id) {
    const wasCaught = caughtSet.has(id);
    const wasSeen   = seenSet.has(id);
    if (!wasSeen && !wasCaught)       seenSet.add(id);
    else if (wasSeen && !wasCaught) { caughtSet.add(id); }
    else { seenSet.delete(id); caughtSet.delete(id); }
    await savePokedex();
    renderStats();
    renderGrid();
  }

  async function savePokedex() {
    try {
      await db.collection('players').doc(currentUser.uid).update({
        pokedexSeen:   Array.from(seenSet),
        pokedexCaught: Array.from(caughtSet)
      });
    } catch(e) { showToast('Fehler beim Speichern!', true); }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filter-' + f).classList.add('active');
    renderGrid();
  }
</script>
</body>
</html>
