<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Tracker – Fortschritt</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .badge-selector { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:8px; }
    .badge-tile {
      border:3px solid #ddd; border-radius:var(--radius-sm); padding:14px 8px;
      text-align:center; transition:all 0.2s; background:white; position:relative;
    }
    .badge-tile.earned  { border-color:gold; background:#FFFBE0; cursor:pointer; }
    .badge-tile.earned:hover { transform:scale(1.04); }
    .badge-tile.next    { border-color:var(--mid-green); background:var(--light-green); cursor:pointer; animation:pulse 1.5s infinite; }
    .badge-tile.locked  { opacity:0.35; cursor:not-allowed; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(109,201,109,0.4)} 50%{box-shadow:0 0 0 8px rgba(109,201,109,0)} }

    .badge-tile .b-icon  { font-size:28px; display:block; margin-bottom:4px; }
    .badge-tile .b-name  { font-size:11px; font-weight:800; color:var(--text-dark); }
    .badge-tile .b-gym   { font-size:10px; color:var(--text-mid); }
    .badge-tile.earned .b-name { color:#8B6914; }
    .badge-tile.next   .b-name { color:var(--dark-green); }
    .lock-overlay { position:absolute; top:6px; right:6px; font-size:12px; }

    .current-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
  </style>
</head>
<body>

<div id="loading-screen"><div class="pokeball-loader"></div></div>
<div id="toast-container"></div>
<div class="mobile-header" id="mobile-header"></div>
<nav class="navbar" id="main-nav"></nav>
<nav class="mobile-nav" id="mobile-nav"></nav>

<div class="page-wrapper">
  <div class="page-title"><span class="icon">🗺️</span> SPIELFORTSCHRITT</div>

  <div class="current-stats" id="current-stats"></div>

  <!-- Orden -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-title">🏅 ARENA-ORDEN</div>
    <p style="font-size:13px;color:var(--text-mid);margin-bottom:14px">
      Du kannst nur den nächsten Orden freischalten. Orden müssen der Reihe nach geholt werden.
    </p>
    <div class="badge-selector" id="badge-selector"></div>
  </div>

  <!-- Notizen -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-title">📝 SPIELNOTIZEN</div>
    <div class="form-group">
      <label class="form-label">Wo bin ich gerade?</label>
      <textarea id="notes-text" class="form-control" style="min-height:100px;resize:vertical"
        placeholder="z.B. Bin gerade im Safarizone, habe 5 Orden..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveNotes()">💾 Notizen speichern</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
  const BADGES = [
    {name:'Felsorden',   gym:'Pewter City',    icon:'🪨'},
    {name:'Kaskadenord.',gym:'Cerulean City',  icon:'💧'},
    {name:'Donnerorden', gym:'Vermilion City', icon:'⚡'},
    {name:'Regenbogen',  gym:'Celadon City',   icon:'🌈'},
    {name:'Sumpforden',  gym:'Fuchsia City',   icon:'🌿'},
    {name:'Marschen',    gym:'Saffron City',   icon:'🔮'},
    {name:'Vulkanorden', gym:'Cinnabar Island',icon:'🔥'},
    {name:'Erdorden',    gym:'Viridian City',  icon:'🌍'},
  ];

  let earnedBadges = 0;

  requireAuth(async (user, data) => {
    earnedBadges = data?.badges || 0;
    renderStats(data);
    renderBadges();
    loadNotes();
  });

  function renderStats(data) {
    document.getElementById('current-stats').innerHTML = `
      <div class="stat-box">
        <span class="stat-number">${data?.badges||0}/8</span>
        <div class="stat-label">Orden erhalten</div>
      </div>
      <div class="stat-box">
        <span class="stat-number">${(data?.pokedexCaught||[]).length}</span>
        <div class="stat-label">Gefangen</div>
      </div>`;
  }

  function renderBadges() {
    const el = document.getElementById('badge-selector');
    el.innerHTML = '';
    BADGES.forEach((b, i) => {
      const tile = document.createElement('div');
      const isEarned = i < earnedBadges;
      const isNext   = i === earnedBadges;
      const isLocked = i > earnedBadges;
      tile.className = 'badge-tile ' + (isEarned ? 'earned' : isNext ? 'next' : 'locked');
      tile.innerHTML = `
        ${isLocked ? '<span class="lock-overlay">🔒</span>' : ''}
        <span class="b-icon">${b.icon}</span>
        <div class="b-name">${b.name}</div>
        <div class="b-gym">${b.gym}</div>
        ${isNext ? '<div style="font-size:10px;color:var(--dark-green);font-weight:800;margin-top:3px">← Nächster</div>' : ''}
        ${isEarned ? '<div style="font-size:10px;color:#8B6914;margin-top:3px">✓ Erhalten</div>' : ''}
      `;
      if (isNext) tile.onclick = () => earnBadge(i);
      if (isEarned && i === earnedBadges - 1) {
        tile.title = 'Doppelklick zum Rückgängigmachen';
        tile.ondblclick = () => revokeBadge(i);
      }
      el.appendChild(tile);
    });
  }

  async function earnBadge(index) {
    if (index !== earnedBadges) return;
    earnedBadges = index + 1;
    await saveBadges();
    renderBadges();
    showToast(`${BADGES[index].name} erhalten! 🏅 (${earnedBadges}/8)`);
  }

  async function revokeBadge(index) {
    earnedBadges = index;
    await saveBadges();
    renderBadges();
    showToast('Orden rückgängig gemacht.');
  }

  async function saveBadges() {
    await db.collection('players').doc(currentUser.uid).update({ badges: earnedBadges });
  }

  async function loadNotes() {
    try {
      const snap = await db.collection('player_notes').doc(currentUser.uid).get();
      if (snap.exists) document.getElementById('notes-text').value = snap.data().notes || '';
    } catch(e) {}
  }

  async function saveNotes() {
    const text = document.getElementById('notes-text').value;
    try {
      await db.collection('player_notes').doc(currentUser.uid).set({
        uid: currentUser.uid, notes: text,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('Notizen gespeichert! 📝');
    } catch(e) { showToast('Fehler!', true); }
  }
</script>
</body>
</html>
